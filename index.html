<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <meta name="color-scheme" content="light dark" /> -->
    <title>Canvas Hub</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body
    class="overflow-hidden w-screen h-screen m-0 p-0 bg-gray-50 text-gray-800 select-none"
  >
    <!-- ЭКРАН ХАБА -->
    <div
      id="hub-screen"
      class="w-full h-full p-6 overflow-y-auto absolute inset-0 z-50 bg-gray-50 flex flex-col"
    >
      <div
        class="flex justify-between items-center mb-8 max-w-5xl mx-auto w-full"
      >
        <h1 class="text-3xl font-bold">Мои холсты</h1>
        <div class="flex gap-3">
          <button
            id="import-btn"
            class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-5 py-3 rounded-2xl font-bold shadow-sm transition-colors flex items-center gap-2"
          >
            <i data-lucide="download" class="w-5 h-5"></i> Загрузить
          </button>
          <input
            type="file"
            id="import-file-input"
            class="hidden"
            accept=".json,.svg"
          />
          <button
            id="new-project-btn"
            class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-3 rounded-2xl font-bold shadow-sm transition-colors flex items-center gap-2"
          >
            <i data-lucide="plus" class="w-5 h-5"></i> Новый холст
          </button>
        </div>
      </div>
      <div
        id="projects-grid"
        class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 max-w-5xl mx-auto w-full pb-20"
      ></div>
    </div>

    <!-- ЭКРАН РЕДАКТОРА -->
    <div
      id="editor-screen"
      class="hidden w-full h-full absolute inset-0 overflow-hidden"
    >
      <!-- Контейнер холста -->
      <div id="canvas-container" class="absolute inset-0 z-0">
        <canvas id="app" class="touch-none w-full h-full block"></canvas>
      </div>

      <!-- Кнопка Назад -->
      <div
        class="absolute bottom-4 left-4 z-20 flex items-center gap-2 pointer-events-none"
      >
        <button
          id="back-to-hub-btn"
          class="h-12 px-4 bg-white/80 hover:bg-white backdrop-blur-sm rounded-2xl shadow-sm font-bold text-gray-700 pointer-events-auto transition-colors flex items-center justify-center gap-2"
        >
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>

        <button
          id="zoom-out"
          aria-label="Отдалить"
          class="w-12 h-12 bg-white/80 hover:bg-white backdrop-blur-sm text-gray-700 rounded-2xl shadow-sm transition-colors flex items-center justify-center pointer-events-auto"
        >
          <i data-lucide="minus" class="w-6 h-6"></i>
        </button>

        <button
          id="zoom-reset"
          title="Сбросить масштаб"
          class="px-3 h-12 bg-white/80 hover:bg-white backdrop-blur-sm text-gray-700 rounded-2xl shadow-sm transition-colors font-bold text-sm pointer-events-auto"
        >
          100%
        </button>

        <button
          id="zoom-in"
          aria-label="Приблизить"
          class="w-12 h-12 bg-white/80 hover:bg-white backdrop-blur-sm text-gray-700 rounded-2xl shadow-sm transition-colors flex items-center justify-center pointer-events-auto"
        >
          <i data-lucide="plus" class="w-6 h-6"></i>
        </button>
      </div>

      <div
        id="fps-counter"
        class="absolute bottom-4 right-4 z-50 bg-black/60 text-white font-mono text-xs px-2 py-1 rounded-lg pointer-events-none shadow-sm backdrop-blur-sm"
      >
        FPS: 0
      </div>

      <!-- UI ТУЛБАРЫ -->
      <div id="UI" class="absolute inset-0 z-10 pointer-events-none">
        <div class="grid grid-cols-3 p-4 w-full items-start">
          <!-- КОЛОНКА 1: Кнопки Undo/Redo -->
          <div
            id="UI-button"
            class="flex gap-2 pointer-events-auto items-center"
          >
            <button
              id="undo"
              aria-label="Отменить"
              class="w-12 h-12 bg-white/80 backdrop-blur-sm text-gray-700 rounded-2xl shadow-sm hover:bg-white transition-colors flex items-center justify-center"
            >
              <i data-lucide="undo" class="w-6 h-6"></i>
            </button>
            <button
              id="redo"
              aria-label="Повторить"
              class="w-12 h-12 bg-white/80 backdrop-blur-sm text-gray-700 rounded-2xl shadow-sm hover:bg-white transition-colors flex items-center justify-center"
            >
              <i data-lucide="redo" class="w-6 h-6"></i>
            </button>
          </div>

          <!-- КОЛОНКА 2: Быстрые настройки размера (По центру) -->
          <div class="flex justify-center">
            <div
              id="UI-quick-settings"
              class="flex gap-1 md:gap-2 pointer-events-auto bg-white/80 backdrop-blur-sm shadow-sm p-1.5 rounded-2xl items-center transition-opacity duration-200"
            >
              <button
                id="size-0"
                class="w-10 h-10 rounded-xl font-bold text-gray-600 flex items-center justify-center hover:bg-gray-200 transition-colors"
              >
                S
              </button>
              <button
                id="size-1"
                class="w-10 h-10 rounded-xl font-bold text-gray-600 flex items-center justify-center hover:bg-gray-200 transition-colors"
              >
                M
              </button>
              <button
                id="size-2"
                class="w-10 h-10 rounded-xl font-bold text-gray-600 flex items-center justify-center hover:bg-gray-200 transition-colors"
              >
                L
              </button>
            </div>
          </div>

          <!-- КОЛОНКА 3: Инструменты справа -->
          <div
            class="flex flex-col items-end gap-2 ml-auto pointer-events-none"
          >
            <div
              id="UI-pens"
              class="flex gap-2 pointer-events-auto bg-white/80 p-1.5 rounded-2xl shadow-sm backdrop-blur-sm items-center justify-end"
            >
              <div id="pens-container" class="flex gap-2"></div>
              <div class="w-px h-6 bg-gray-300 mx-1"></div>
              <button
                id="settings-open-btn"
                aria-label="Настройки"
                class="w-10 h-10 rounded-xl hover:bg-gray-200 transition-colors flex items-center justify-center text-gray-700"
              >
                <i data-lucide="settings" class="w-5 h-5"></i>
              </button>
            </div>

            <button
              id="lib-action-btn"
              aria-label="Библиотека"
              class="w-12 h-12 bg-white/80 backdrop-blur-sm shadow-sm rounded-2xl pointer-events-auto flex items-center justify-center text-gray-700 hover:bg-white transition-colors"
            >
              <i data-lucide="library" class="w-6 h-6 pointer-events-none"></i>
            </button>
          </div>
        </div>

        <!-- Контейнер палитры (слева по центру) -->
        <div
          id="palette-container"
          class="absolute left-4 top-1/2 -translate-y-1/2 flex flex-col gap-3 pointer-events-auto bg-white/80 p-2 rounded-full shadow-sm backdrop-blur-sm"
        ></div>

        <!-- Панель библиотеки (справа) -->
        <div
          id="library-panel"
          class="fixed top-0 right-0 w-80 h-full bg-white/95 backdrop-blur-xl shadow-2xl z-40 flex flex-col pointer-events-auto transform translate-x-full transition-transform duration-300"
        >
          <div class="flex justify-between items-center p-5 border-b">
            <h3 class="font-bold text-gray-800 text-lg">Библиотека</h3>
            <button
              id="library-close-btn"
              class="text-gray-500 hover:bg-gray-100 w-10 h-10 flex items-center justify-center rounded-full transition-colors"
            >
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>
          <div
            id="library-grid"
            class="p-4 grid grid-cols-2 gap-3 overflow-y-auto flex-1 content-start"
          ></div>
          <div
            id="library-status"
            class="m-4 text-sm text-center font-bold text-blue-500 bg-blue-50 border border-blue-100 py-3 rounded-xl hidden shadow-sm"
          >
            Тапните по холсту, чтобы вставить объект
          </div>
        </div>
      </div>

      <!-- Модальное окно настроек -->
      <div
        id="settings-modal"
        class="hidden absolute inset-0 bg-black/40 z-50 pointer-events-auto flex items-center justify-center backdrop-blur-sm"
      >
        <div
          class="bg-white rounded-2xl shadow-xl w-96 max-h-[80vh] flex flex-col overflow-hidden"
        >
          <div class="flex justify-between items-center p-4 border-b">
            <h2 class="text-xl font-bold">Настройки</h2>
            <button
              id="settings-close-btn"
              class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-500"
            >
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>
          <div class="flex border-b bg-gray-50 text-sm">
            <button
              class="settings-tab flex-1 py-2 border-b-2 border-blue-500 font-semibold"
              data-tab="canvas"
            >
              Холст
            </button>
            <button
              class="settings-tab flex-1 py-2 border-b-2 border-transparent text-gray-500"
              data-tab="pens"
            >
              Кисть
            </button>
            <button
              class="settings-tab flex-1 py-2 border-b-2 border-transparent text-gray-500"
              data-tab="colors"
            >
              Цвета
            </button>
            <button
              class="settings-tab flex-1 py-2 border-b-2 border-transparent text-gray-500"
              data-tab="export"
            >
              Экспорт
            </button>
          </div>
          <div id="settings-content" class="p-4 overflow-y-auto flex-1"></div>
        </div>
      </div>

      <!-- Скрытые элементы -->
      <input
        type="color"
        id="hidden-picker"
        class="opacity-0 absolute pointer-events-none"
      />
      <div
        id="cursor-circle"
        class="absolute rounded-full border border-gray-500 pointer-events-none hidden z-50"
        style="transform: translate(-50%, -50%)"
      ></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
