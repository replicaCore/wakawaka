<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>canvas</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="overflow-hidden w-screen h-screen m-0 p-0">
    <div>
      <div id="UI" class="absolute inset-0 z-10 pointer-events-none">
        <div class="flex justify-between items-start p-4 w-full">
          <div id="UI button" class="flex gap-2 pointer-events-auto">
            <button
              id="undo"
              class="w-12 h-12 bg-blue-50 text-cyan-500 rounded-xl shadow-sm"
            >
              
            </button>
            <button
              id="redo"
              class="w-12 h-12 bg-blue-50 text-cyan-500 rounded-xl shadow-sm scale-x-[-1] inline-block"
            >
              
            </button>
          </div>

          <div
            id="UI button"
            class="absolute flex gap-2 right-4 bottom-4 pointer-events-auto"
          >
            <button
              id="undo"
              class="w-12 h-12 bg-blue-50 text-cyan-500 rounded-xl shadow-sm"
            >
              
            </button>
            <button
              id="redo"
              class="w-12 h-12 bg-blue-50 text-cyan-500 rounded-xl shadow-sm scale-x-[-1] inline-block"
            >
              
            </button>
          </div>

          <div
            id="UI pens"
            class="flex gap-2 pointer-events-auto bg-white/80 p-1.5 rounded-2xl shadow-sm backdrop-blur-sm items-center"
          >
            <div id="pens-container" class="flex gap-2"></div>
            <div class="w-px h-6 bg-gray-300 mx-1"></div>
            <input
              type="range"
              id="pen-size-slider"
              min="1"
              max="100"
              class="w-20 cursor-pointer"
            />

            <button
              id="settings-open-btn"
              class="w-10 h-10 rounded-xl hover:bg-gray-200 transition-colors"
            >
              ⚙️
            </button>

            <button
              id="eraser-mode-btn"
              class="hidden text-xs bg-gray-200 text-gray-700 font-medium rounded px-2 py-2 hover:bg-gray-300 ml-1"
            >
              Частично
            </button>
          </div>
        </div>

        <div
          id="palette-container"
          class="absolute left-4 top-1/2 -translate-y-1/2 flex flex-col gap-3 pointer-events-auto bg-white/80 p-2 rounded-full shadow-sm backdrop-blur-sm"
        ></div>
      </div>

      <div
        id="settings-modal"
        class="hidden absolute inset-0 bg-black/40 z-50 pointer-events-auto flex items-center justify-center backdrop-blur-sm"
      >
        <div
          class="bg-white rounded-2xl shadow-xl w-96 max-h-[80vh] flex flex-col overflow-hidden"
        >
          <div class="flex justify-between items-center p-4 border-b">
            <h2 class="text-xl font-bold">Настройки</h2>
            <button
              id="settings-close-btn"
              class="w-8 h-8 rounded-full hover:bg-gray-100 font-bold"
            >
              ✕
            </button>
          </div>

          <div class="flex border-b bg-gray-50">
            <button
              class="settings-tab flex-1 py-2 border-b-2 border-blue-500 font-semibold"
              data-tab="canvas"
            >
              Холст
            </button>
            <button
              class="settings-tab flex-1 py-2 border-b-2 border-transparent text-gray-500"
              data-tab="pens"
            >
              Кисти
            </button>
            <button
              class="settings-tab flex-1 py-2 border-b-2 border-transparent text-gray-500"
              data-tab="colors"
            >
              Цвета
            </button>
          </div>

          <div id="settings-content" class="p-4 overflow-y-auto flex-1"></div>
        </div>
      </div>

      <div id="canvas-container" class="absolute top-0 left-0 w-full h-full">
        <canvas id="app" class="touch-none w-full h-full block"></canvas>
      </div>
      <input
        type="color"
        id="hidden-picker"
        class="opacity-0 absolute pointer-events-none"
      />
      <div
        id="cursor-circle"
        class="absolute rounded-full border border-gray-500 pointer-events-none hidden z-50"
        style="transform: translate(-50%, -50%)"
      ></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
