<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>canvas</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="overflow-hidden w-screen h-screen m-0 p-0">
    <div>
      <div
        id="UI"
        class="absolute top-0 left-0 z-10 w-full flex gap-2 items-center p-2 pointer-events-none"
      >
        <div id="UI button" class="pointer-events-auto">
          <button id="undo" class="w-12 h-12 bg-blue-50 text-cyan-100">
            
          </button>
          <button id="redo" class="w-12 h-12 bg-blue-50 text-cyan-100">
            󰑏
          </button>
        </div>
        <div id="UI palette" class="flex ml-auto gap-2 pointer-events-auto">
          <div
            class="palette-btn w-12 h-12 rounded-full border-2 border-b-neutral-100"
            data-index="0"
          ></div>
          <div
            class="palette-btn w-12 h-12 rounded-full border-2 border-b-neutral-100"
            data-index="1"
          ></div>
          <div
            class="palette-btn w-12 h-12 rounded-full border-2 border-b-neutral-100"
            data-index="2"
          ></div>
          <div
            class="palette-btn w-12 h-12 rounded-full border-2 border-b-neutral-100"
            data-index="3"
          ></div>
          <div
            class="palette-btn w-12 h-12 rounded-full border-2 border-b-neutral-100"
            data-index="4"
          ></div>
        </div>
      </div>
      <div id="canvas-container" class="absolute top-0 left-0 w-full h-full">
        <canvas id="app" class="touch-none w-full h-full block"></canvas>
      </div>
      <input
        type="color"
        id="hidden-picker"
        class="opacity-0 absolute pointer-events-none"
      />
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
